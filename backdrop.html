<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MDA Exhibition Backdrop — Maritime Threat Scene</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    .container { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
    svg { max-width: 100%; max-height: 100%; }
  </style>
</head>
<body>
  <div class="container">
    <svg viewBox="0 0 680 567" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Smoke gradient: dark gray to black -->
        <radialGradient id="smokeGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" style="stop-color:#3a3a3a;stop-opacity:0.8"/>
          <stop offset="70%" style="stop-color:#1a1a1a;stop-opacity:0.5"/>
          <stop offset="100%" style="stop-color:#000000;stop-opacity:0"/>
        </radialGradient>
        <!-- Fire gradient: orange to deep red -->
        <radialGradient id="fireGrad" cx="40%" cy="40%" r="60%">
          <stop offset="0%" style="stop-color:#ffaa00;stop-opacity:1"/>
          <stop offset="50%" style="stop-color:#ff4400;stop-opacity:0.9"/>
          <stop offset="100%" style="stop-color:#660000;stop-opacity:0"/>
        </radialGradient>
        <!-- Glow filter for fire -->
        <filter id="fireGlow">
          <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
          <feMerge>
            <feMergeNode in="coloredBlur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
        <!-- Shadow filter -->
        <filter id="shadow">
          <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
        </filter>
      </defs>

      <!-- Background -->
      <rect width="680" height="567" fill="#0a0e15"/>

      <!-- ============ HEADER (68px) ============ -->
      <rect width="680" height="68" fill="#050810" stroke="#1a2d3a" stroke-width="1"/>
      <text x="14" y="28" font-family="IBM Plex Mono" font-size="18" font-weight="700" fill="#4ad4ff" letter-spacing="2">MDA</text>
      <text x="14" y="48" font-family="IBM Plex Mono" font-size="10" fill="#7fbcd4" letter-spacing="1">Maritime Domain Awareness</text>
      <text x="14" y="60" font-family="IBM Plex Mono" font-size="8" fill="#3a7a8a">ศูนย์บัญชาการข่าวกรองทางทะเล</text>

      <!-- Live status badge -->
      <rect x="550" y="12" width="110" height="22" rx="4" fill="none" stroke="#00d97e" stroke-width="1"/>
      <circle cx="560" cy="23" r="2.5" fill="#00d97e"/>
      <text x="572" y="26" font-family="IBM Plex Mono" font-size="9" fill="#00d97e" font-weight="700">LIVE · 22:47</text>

      <!-- ============ LEFT PANEL: TACTICAL MAP (434×364px, y=68) ============ -->
      <g id="map-panel">
        <rect x="14" y="82" width="406" height="364" rx="8" fill="#020810" stroke="#1a3344" stroke-width="1"/>

        <!-- Grid -->
        <g stroke="#0d1f2a" stroke-width="0.5" opacity="0.3">
          <line x1="30" y1="82" x2="30" y2="446"/><line x1="60" y1="82" x2="60" y2="446"/>
          <line x1="90" y1="82" x2="90" y2="446"/><line x1="120" y1="82" x2="120" y2="446"/>
          <line x1="150" y1="82" x2="150" y2="446"/><line x1="180" y1="82" x2="180" y2="446"/>
          <line x1="210" y1="82" x2="210" y2="446"/><line x1="240" y1="82" x2="240" y2="446"/>
          <line x1="270" y1="82" x2="270" y2="446"/><line x1="300" y1="82" x2="300" y2="446"/>
          <line x1="330" y1="82" x2="330" y2="446"/><line x1="360" y1="82" x2="360" y2="446"/>
          <line x1="14" y1="120" x2="420" y2="120"/><line x1="14" y1="150" x2="420" y2="150"/>
          <line x1="14" y1="180" x2="420" y2="180"/><line x1="14" y1="210" x2="420" y2="210"/>
          <line x1="14" y1="240" x2="420" y2="240"/><line x1="14" y1="270" x2="420" y2="270"/>
          <line x1="14" y1="300" x2="420" y2="300"/><line x1="14" y1="330" x2="420" y2="330"/>
          <line x1="14" y1="360" x2="420" y2="360"/><line x1="14" y1="390" x2="420" y2="390"/>
          <line x1="14" y1="420" x2="420" y2="420"/>
        </g>

        <!-- Landmass silhouettes (simplified Southeast Asia) -->
        <path d="M 60 150 L 80 140 L 100 145 L 95 165 L 75 170 Z" fill="#0a1a25" opacity="0.6"/>
        <path d="M 150 200 L 190 180 L 210 210 L 180 230 Z" fill="#0a1a25" opacity="0.6"/>
        <path d="M 250 120 L 320 115 L 330 180 L 300 190 L 260 160 Z" fill="#0a1a25" opacity="0.6"/>

        <!-- Shipping lanes (dashed) -->
        <line x1="40" y1="200" x2="380" y2="220" stroke="#1a4455" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
        <line x1="60" y1="280" x2="350" y2="290" stroke="#1a4455" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
        <line x1="100" y1="360" x2="360" y2="350" stroke="#1a4455" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
        <line x1="80" y1="400" x2="320" y2="410" stroke="#1a4455" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>

        <!-- Chokepoints (color-coded: red=critical, orange=high, cyan=normal) -->
        <circle cx="120" cy="200" r="8" fill="none" stroke="#ff3b3b" stroke-width="1.5" opacity="0.8"/>
        <text x="115" y="215" font-family="IBM Plex Mono" font-size="7" fill="#ff3b3b">A</text>

        <circle cx="180" cy="280" r="8" fill="none" stroke="#ff8c00" stroke-width="1.5" opacity="0.8"/>
        <text x="175" y="295" font-family="IBM Plex Mono" font-size="7" fill="#ff8c00">B</text>

        <circle cx="240" cy="320" r="8" fill="none" stroke="#ff3b3b" stroke-width="1.5" opacity="0.8"/>
        <text x="235" y="335" font-family="IBM Plex Mono" font-size="7" fill="#ff3b3b">C</text>

        <circle cx="310" cy="260" r="8" fill="none" stroke="#00e5ff" stroke-width="1.5" opacity="0.8"/>
        <text x="305" y="275" font-family="IBM Plex Mono" font-size="7" fill="#00e5ff">D</text>

        <circle cx="360" cy="380" r="8" fill="none" stroke="#ff8c00" stroke-width="1.5" opacity="0.8"/>
        <text x="355" y="395" font-family="IBM Plex Mono" font-size="7" fill="#ff8c00">E</text>

        <!-- Vessel markers (triangles by type) -->
        <polygon points="150,150 155,160 145,160" fill="#00e5ff" opacity="0.8"/>
        <polygon points="200,240 205,250 195,250" fill="#4ad4ff" opacity="0.8"/>
        <polygon points="280,310 285,320 275,320" fill="#ff8c00" opacity="0.8"/>
        <polygon points="340,200 345,210 335,210" fill="#ff3b3b" opacity="0.8"/>
        <polygon points="100,380 105,390 95,390" fill="#00e5ff" opacity="0.8"/>

        <!-- Incident dots -->
        <circle cx="220" cy="180" r="3" fill="#ff3b3b" opacity="0.8"/>
        <circle cx="310" cy="350" r="3" fill="#ff8c00" opacity="0.8"/>
      </g>

      <!-- ============ RIGHT PANEL: THREAT SCENE (218×210px, x=434, y=82) ============ -->
      <g id="threat-scene">
        <!-- Background water gradient -->
        <rect x="434" y="82" width="232" height="210" fill="#0a1a25"/>

        <!-- ===== TANKER (target) ===== -->
        <!-- Hull -->
        <rect x="460" y="190" width="80" height="35" rx="2" fill="#4a6a7a" stroke="#2a4a5a" stroke-width="1"/>
        <!-- Cargo hold (3 segments) -->
        <rect x="465" y="180" width="20" height="12" fill="#6a8a9a" stroke="#2a4a5a" stroke-width="0.5"/>
        <rect x="490" y="175" width="22" height="15" fill="#7a9aaa" stroke="#2a4a5a" stroke-width="0.5"/>
        <rect x="518" y="182" width="18" height="12" fill="#6a8a9a" stroke="#2a4a5a" stroke-width="0.5"/>
        <!-- Stack (smokestack) -->
        <rect x="530" y="155" width="8" height="25" fill="#3a5a6a" stroke="#1a3a4a" stroke-width="0.5"/>
        <!-- Cabin -->
        <rect x="475" y="168" width="12" height="10" fill="#5a7a8a" stroke="#1a3a4a" stroke-width="0.5"/>

        <!-- ===== EXPLOSION & DAMAGE ===== -->
        <!-- Hit point at waterline -->
        <circle cx="515" cy="200" r="12" fill="url(#fireGrad)" filter="url(#fireGlow)" opacity="0.95"/>
        <!-- Concentric shock circles -->
        <circle cx="515" cy="200" r="18" fill="none" stroke="#ff6600" stroke-width="1" opacity="0.6" stroke-dasharray="2,2"/>
        <circle cx="515" cy="200" r="28" fill="none" stroke="#ff3300" stroke-width="0.5" opacity="0.3" stroke-dasharray="3,3"/>

        <!-- Dark smoke plumes (thick, realistic) -->
        <!-- Large dark smoke mass 1 -->
        <ellipse cx="500" cy="140" rx="35" ry="45" fill="url(#smokeGrad)" opacity="0.85"/>
        <!-- Dark smoke mass 2 (overlapping) -->
        <ellipse cx="535" cy="125" rx="38" ry="50" fill="url(#smokeGrad)" opacity="0.80"/>
        <!-- Dark smoke mass 3 (upper) -->
        <ellipse cx="520" cy="100" rx="32" ry="40" fill="url(#smokeGrad)" opacity="0.75"/>

        <!-- Black soot layer -->
        <ellipse cx="515" cy="145" rx="40" ry="35" fill="#0a0a0a" opacity="0.5"/>

        <!-- Fire glow inside smoke -->
        <circle cx="510" cy="160" r="25" fill="#ff5500" opacity="0.4"/>
        <circle cx="525" cy="150" r="20" fill="#ff7700" opacity="0.35"/>

        <!-- ===== ATTACK BOAT (red skiff) ===== -->
        <path d="M 455 215 L 470 210 L 472 220 L 460 225 Z" fill="#dd2222" stroke="#aa0000" stroke-width="0.5"/>
        <!-- Cabin small -->
        <rect x="465" y="213" width="4" height="3" fill="#aa0000"/>
        <!-- Speed line (dash) -->
        <line x1="430" y1="217" x2="455" y2="215" stroke="#ff5555" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.6"/>

        <!-- ===== ESCORT WARSHIP (right side) ===== -->
        <rect x="570" y="200" width="45" height="28" fill="#4a6a7a" stroke="#2a4a5a" stroke-width="0.5"/>
        <!-- Superstructure -->
        <rect x="580" y="185" width="20" height="18" fill="#5a7a8a" stroke="#1a3a4a" stroke-width="0.5"/>
        <!-- Radar array -->
        <circle cx="590" cy="180" r="4" fill="none" stroke="#3a7a9a" stroke-width="0.5" opacity="0.7"/>
        <!-- Defensive radar sweep (teal semicircles) -->
        <path d="M 590 180 A 15 15 0 0 1 605 180" fill="none" stroke="#00b8d4" stroke-width="1" opacity="0.5" stroke-dasharray="2,2"/>
        <path d="M 590 180 A 22 22 0 0 1 612 180" fill="none" stroke="#00b8d4" stroke-width="0.5" opacity="0.3" stroke-dasharray="3,3"/>

        <!-- ===== INBOUND DRONE/MISSILE ===== -->
        <!-- Diagonal trajectory from top-right -->
        <line x1="600" y1="80" x2="530" y2="185" stroke="#ff5555" stroke-width="0.5" stroke-dasharray="2,1" opacity="0.5"/>
        <!-- Missile body -->
        <rect x="595" y="85" width="2" height="12" fill="#ff3333" stroke="#aa0000" stroke-width="0.5" transform="rotate(-45 596 91)"/>
        <!-- Arrowhead tip -->
        <polygon points="600,80 598,84 602,84" fill="#ff5555" opacity="0.8"/>

        <!-- Impact spray/water effect -->
        <circle cx="515" cy="215" r="8" fill="#3a7a9a" opacity="0.3"/>
      </g>

      <!-- ============ THREAT CONDITION BADGE (218×84px, x=434, y=302) ============ -->
      <g id="threat-badge">
        <rect x="434" y="302" width="232" height="84" rx="8" fill="#1a1410" stroke="#8b6914" stroke-width="1.5"/>
        <text x="450" y="330" font-family="IBM Plex Mono" font-size="12" font-weight="700" fill="#d4a017" letter-spacing="1">THREAT CONDITION</text>
        <text x="450" y="350" font-family="IBM Plex Mono" font-size="28" font-weight="700" fill="#ffc700" letter-spacing="2">III</text>
        <text x="450" y="372" font-family="IBM Plex Mono" font-size="13" font-weight="600" fill="#ff9900">ELEVATED</text>
      </g>

      <!-- ============ STATS (218×56px, x=434, y=396) ============ -->
      <g id="stats">
        <g id="stat-1">
          <rect x="440" y="405" width="50" height="40" rx="4" fill="#080f16" stroke="#0f1f2a" stroke-width="0.5"/>
          <text x="448" y="420" font-family="IBM Plex Mono" font-size="14" font-weight="700" fill="#d4eaf5">18K</text>
          <text x="448" y="433" font-family="IBM Plex Mono" font-size="8" fill="#3a5566">vessels</text>
        </g>
        <g id="stat-2">
          <rect x="505" y="405" width="50" height="40" rx="4" fill="#080f16" stroke="#0f1f2a" stroke-width="0.5"/>
          <text x="513" y="420" font-family="IBM Plex Mono" font-size="14" font-weight="700" fill="#ff8c00">8</text>
          <text x="510" y="433" font-family="IBM Plex Mono" font-size="8" fill="#3a5566">events</text>
        </g>
        <g id="stat-3">
          <rect x="570" y="405" width="50" height="40" rx="4" fill="#080f16" stroke="#0f1f2a" stroke-width="0.5"/>
          <text x="578" y="420" font-family="IBM Plex Mono" font-size="14" font-weight="700" fill="#00e5ff">10</text>
          <text x="570" y="433" font-family="IBM Plex Mono" font-size="8" fill="#3a5566">critical</text>
        </g>
        <g id="stat-4">
          <rect x="635" y="405" width="40" height="40" rx="4" fill="#080f16" stroke="#0f1f2a" stroke-width="0.5"/>
          <text x="641" y="420" font-family="IBM Plex Mono" font-size="14" font-weight="700" fill="#00d97e">74%</text>
          <text x="638" y="433" font-family="IBM Plex Mono" font-size="8" fill="#3a5566">verified</text>
        </g>
      </g>

      <!-- ============ BOTTOM LEGEND & NEWS (660×86px, y=451) ============ -->
      <rect y="451" width="680" height="116" fill="#030810" stroke="#0d1f2a" stroke-width="1"/>

      <!-- Legend section -->
      <g id="legend">
        <text x="14" y="470" font-family="IBM Plex Mono" font-size="8" fill="#3a7a8a" font-weight="700" letter-spacing="1">LEGEND</text>

        <circle cx="20" cy="488" r="2.5" fill="#00e5ff"/><text x="28" y="491" font-family="IBM Plex Mono" font-size="7" fill="#7fbcd4">Civilian</text>
        <circle cx="90" cy="488" r="2.5" fill="#4ad4ff"/><text x="98" y="491" font-family="IBM Plex Mono" font-size="7" fill="#7fbcd4">Cargo</text>
        <circle cx="150" cy="488" r="2.5" fill="#ff8c00"/><text x="158" y="491" font-family="IBM Plex Mono" font-size="7" fill="#7fbcd4">Suspicious</text>
        <circle cx="240" cy="488" r="2.5" fill="#ff3b3b"/><text x="248" y="491" font-family="IBM Plex Mono" font-size="7" fill="#7fbcd4">Hostile</text>
        <circle cx="310" cy="488" r="2.5" fill="#ffd700"/><text x="318" y="491" font-family="IBM Plex Mono" font-size="7" fill="#7fbcd4">Military</text>

        <line x1="14" y1="500" x2="340" y2="500" stroke="#1a3344" stroke-width="0.5" stroke-dasharray="3,2"/>
        <text x="14" y="511" font-family="IBM Plex Mono" font-size="7" fill="#3a5566">━ Shipping lane  ⬡ Chokepoint  ◈ Incident</text>
      </g>

      <!-- News strip (live OSINT feed) -->
      <g id="news-strip">
        <text x="380" y="470" font-family="IBM Plex Mono" font-size="8" fill="#3a7a8a" font-weight="700" letter-spacing="1">LIVE OSINT</text>

        <text x="380" y="492" font-family="IBM Plex Mono" font-size="8" fill="#c8dde8" font-weight="600">● 22:45 | Houthis attack Red Sea — UKMTO advisory</text>
        <text x="380" y="504" font-family="IBM Plex Mono" font-size="8" fill="#c8dde8" font-weight="600">● 22:23 | Shadow fleet detected — Baltic Strait</text>
        <text x="380" y="516" font-family="IBM Plex Mono" font-size="8" fill="#c8dde8" font-weight="600">● 21:58 | SCS exercise — PLAN activity elevated</text>
      </g>

      <!-- Classification footer -->
      <rect y="531" width="680" height="36" fill="#020810" stroke="#1a2d3a" stroke-width="1"/>
      <text x="14" y="550" font-family="IBM Plex Mono" font-size="7" fill="#1a3344" letter-spacing="2">CONFIDENTIAL · THAI ROYAL NAVY · MDA SITUATION DISPLAY · UPDATED 2025-06-16 22:47 ICT</text>
      <text x="14" y="562" font-family="IBM Plex Mono" font-size="6" fill="#0d1f2a" letter-spacing="1">Exhibition Display: 2500mm × 3000mm · Maritime Intelligence · Southeast Asia AOR</text>
    </svg>
  </div>

  <script>
    // Optional: Subtle animation for smoke
    document.addEventListener('DOMContentLoaded', () => {
      const smokePlumes = document.querySelectorAll('ellipse[id*="smoke"]');
      // Could add CSS animation here if needed
    });
  </script>
</body>
</html>
